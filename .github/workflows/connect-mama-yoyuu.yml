name: Connect mama-yoyuu diagnosis link

on:
  push:
    paths:
      - .github/workflows/connect-mama-yoyuu.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Patch mama-yoyuu card
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('index.html')
          text = path.read_bytes().decode('utf-8')
          nl = '\r\n' if '\r\n' in text else '\n'

          pattern = re.compile(
              r'    <div class="diag-card diag-card-coming reveal reveal-delay-3">\r?\n'
              r'      <div class="coming-badge">COMING SOON</div>\r?\n'
              r'      <div class="diag-no">No\.04</div>\r?\n'
              r'      <div class="diag-icon">☕</div>\r?\n'
              r'      <div class="diag-name">ママの余裕見える化診断</div>\r?\n'
              r'      <p class="diag-desc">\r?\n'
              r'        気づかないうちに削れている<br>\r?\n'
              r'        「ママの心の余裕」を測定。<br>\r?\n'
              r'        セルフケアの優先順位がわかります。\r?\n'
              r'      </p>\r?\n'
              r'      <div class="diag-meta">\r?\n'
              r'        <span class="diag-tag">人気予定</span>\r?\n'
              r'        <span>12問</span>\r?\n'
              r'      </div>\r?\n'
              r'      <span class="diag-link diag-link-disabled">準備中</span>\r?\n'
              r'    </div>'
          )

          replacement = nl.join([
              '    <a href="https://manapagemlab.github.io/mama-yoyuu/" target="_blank" rel="noopener" class="diag-card reveal reveal-delay-3">',
              '      <div class="diag-no">No.04</div>',
              '      <div class="diag-icon">☕</div>',
              '      <div class="diag-name">ママの余裕見える化診断</div>',
              '      <p class="diag-desc">',
              '        気づかないうちに削れている<br>',
              '        「ママの心の余裕」を測定。<br>',
              '        セルフケアの優先順位がわかります。',
              '      </p>',
              '      <div class="diag-meta">',
              '        <span class="diag-tag">人気診断</span>',
              '        <span>12問</span>',
              '      </div>',
              '      <span class="diag-link">診断してみる</span>',
              '    </a>',
          ])

          text, count = pattern.subn(replacement, text)
          if count != 1:
              raise SystemExit(f'Expected to patch 1 mama-yoyuu card, patched {count}')

          path.write_bytes(text.encode('utf-8'))
          PY
      - name: Commit patched page and remove one-time workflow
        run: |
          rm .github/workflows/connect-mama-yoyuu.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/connect-mama-yoyuu.yml
          git commit -m "Connect mama-yoyuu diagnosis link"
          git push
